<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sleep Tracker — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d10;
  --surface: #16161c;
  --surface2: #1e1e27;
  --border: #2a2a38;
  --accent: #7b6ef6;
  --text: #e8e8f0;
  --muted: #6b6b80;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  font-family: 'DM Mono', monospace;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 0%, rgba(123,110,246,.053) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 10% 90%, rgba(123,110,246,.03) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.outer {
  width: 100%;
  max-width: 390px;
  position: relative;
  z-index: 1;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px 36px 42px;
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: -70px; right: -70px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(123,110,246,.075) 0%, transparent 70%);
  pointer-events: none;
}
.card::after {
  content: '';
  position: absolute;
  bottom: -50px; left: -50px;
  width: 160px; height: 160px;
  background: radial-gradient(circle, rgba(123,110,246,.038) 0%, transparent 70%);
  pointer-events: none;
}

.icon-badge {
  width: 40px; height: 40px;
  background: var(--accent);
  border-radius: 11px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  box-shadow: 0 4px 20px rgba(123,110,246,.26);
}
.icon-badge svg {
  width: 20px; height: 20px;
  fill: #fff;
}

.title {
  font-family: 'Instrument Serif', serif;
  font-size: 2rem;
  color: var(--text);
  letter-spacing: -.5px;
  text-align: center;
  line-height: 1.1;
  margin-bottom: 10px;
}
.title em {
  color: var(--accent);
  font-style: italic;
}

.sub {
  font-size: .62rem;
  letter-spacing: .13em;
  text-transform: uppercase;
  color: var(--muted);
  text-align: center;
  margin-bottom: 18px;
}

.divider {
  width: 36px; height: 1px;
  background: var(--border);
  margin-bottom: 14px;
}

.hint {
  font-size: .67rem;
  color: var(--muted);
  text-align: center;
  margin-bottom: 18px;
  letter-spacing: .03em;
}

.google-btn {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 13px 18px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  transition: border-color .2s, background .2s, opacity .2s;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: .78rem;
  letter-spacing: .06em;
  text-transform: uppercase;
  -webkit-appearance: none;
}
.google-btn:hover {
  border-color: var(--accent);
  background: #222230;
}
.google-btn:active { transform: scale(.99); }
.google-btn:disabled { opacity: .5; cursor: not-allowed; }

.g-logo { width: 18px; height: 18px; flex-shrink: 0; display: block; }
.google-btn span { flex: 1; text-align: center; }

.privacy {
  font-size: .57rem;
  letter-spacing: .12em;
  color: #3a3a50;
  text-transform: uppercase;
  margin-top: 22px;
  text-align: center;
}

.date-stamp {
  font-size: .54rem;
  letter-spacing: .12em;
  color: #2a2a3a;
  text-transform: uppercase;
  text-align: center;
  margin-top: 8px;
}

/* Error message */
.error-msg {
  margin-top: 14px;
  font-size: .65rem;
  color: #ff6b6b;
  text-align: center;
  letter-spacing: .04em;
  display: none;
}
.error-msg.show { display: block; }

/* Loading spinner inside button */
.spinner {
  width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,.2);
  border-top-color: var(--text);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="outer">
  <div class="card">

    <div class="icon-badge">
      <svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 100 18A9 9 0 0012 3zm0 4a2 2 0 110 4 2 2 0 010-4zm0 10.5c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
    </div>

    <div class="title">Sleep <em>Tracker</em></div>
    <div class="sub">Your personal rest journal</div>

    <div class="divider"></div>

    <div class="hint">Sign in to sync your data across devices</div>

    <button class="google-btn" id="sign-in-btn" onclick="signInWithGoogle()">
      <svg class="g-logo" viewBox="0 0 18 18">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/>
      </svg>
      <span id="btn-text">Continue with Google</span>
    </button>

    <div class="error-msg" id="error-msg"></div>

    <div class="privacy">Private by default · Data encrypted</div>
    <div class="date-stamp" id="dateStamp"></div>

  </div>
</div>

<!-- Firebase SDKs (modular via CDN compat build) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
  // ── Firebase config ──────────────────────────────────────────────────────
  const firebaseConfig = {
    apiKey: "AIzaSyBmphrwzNfIyhQZx41bALpl8aIeoTiZg5w",
    authDomain: "sleep-tracker-1ac21.firebaseapp.com",
    projectId: "sleep-tracker-1ac21",
    storageBucket: "sleep-tracker-1ac21.firebasestorage.app",
    messagingSenderId: "706043934391",
    appId: "1:706043934391:web:0584cad742465edc4a3f32"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // ── Date stamp ───────────────────────────────────────────────────────────
  const d = new Date();
  document.getElementById('dateStamp').textContent =
    d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });

  // ── If already signed in, go straight to the app ─────────────────────────
  // authResolved flag prevents redirect firing before Firebase has fully
  // checked the persisted session — avoids the sign-in loop on page load.
  let authResolved = false;
  auth.onAuthStateChanged(user => {
    if (user && authResolved) {
      window.location.href = 'Sleep_Tracker.html';
    }
    authResolved = true;
  });

  // ── Google sign-in (popup — avoids redirect loop on GitHub Pages) ─────────
  function signInWithGoogle() {
    const btn  = document.getElementById('sign-in-btn');
    const text = document.getElementById('btn-text');
    const err  = document.getElementById('error-msg');

    btn.disabled = true;
    text.textContent = 'Signing in…';
    err.classList.remove('show');

    const provider = new firebase.auth.GoogleAuthProvider();
    provider.addScope('email');
    provider.addScope('profile');

    auth.signInWithPopup(provider)
      .then(() => {
        window.location.href = 'Sleep_Tracker.html';
      })
      .catch(e => {
        btn.disabled = false;
        text.textContent = 'Continue with Google';
        err.textContent = friendlyError(e.code);
        err.classList.add('show');
      });
  }

  function friendlyError(code) {
    const map = {
      'auth/popup-closed-by-user': 'Sign-in cancelled. Try again.',
      'auth/network-request-failed': 'Network error. Check your connection.',
      'auth/too-many-requests': 'Too many attempts. Try again later.',
      'auth/popup-blocked': 'Popup was blocked. Please allow popups for this site.',
    };
    return map[code] || 'Something went wrong. Please try again.';
  }
</script>
</body>
</html>
